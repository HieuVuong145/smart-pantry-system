; Smart Pantry — ESP32-CAM PlatformIO Configuration
; Board: ESP32-CAM Generic (tương thích AI-Thinker pinout)

; NOTE: Board "esp32cam" trong PlatformIO dùng cấu hình giống
; AI-Thinker và tương thích với hầu hết board ESP32-CAM generic.
[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; Serial monitor
monitor_speed = 115200

; Upload settings
upload_speed = 460800

; Build flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Libraries
lib_deps = 
    ; No external libraries needed — using built-in ESP32 WiFi, HTTPClient, esp_camera
